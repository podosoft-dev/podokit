services:
  # --- Runtime (always started by `docker compose up`) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-podokit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-podokit}
      POSTGRES_DB: ${POSTGRES_DB:-podokit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-podokit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Runtime, but only needed by cache/queue modules. Start with:
  #     docker compose --profile cache up
  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
