apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: podokit
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api, port: { number: 3000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: web, port: { number: 3000 } }
