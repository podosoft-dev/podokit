services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-podokit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-podokit}
      POSTGRES_DB: ${POSTGRES_DB:-podokit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-podokit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local email catcher for dev: SMTP on 1025, web UI + REST API on 8025.
  # Auth password-reset and verification mail lands here — open http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
