apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compression
  namespace: podokit
spec:
  compress: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app
  namespace: podokit
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: podokit-compression@kubernetescrd
spec:
  rules:
    - host: example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api, port: { number: 3000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: web, port: { number: 3000 } }
