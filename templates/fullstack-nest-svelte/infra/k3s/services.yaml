apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: podokit
spec:
  selector: { app: api }
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: podokit
spec:
  selector: { app: web }
  ports:
    - port: 3000
      targetPort: 3000
