version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Node 20 is the supported baseline; stay on the matching @types/node major.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript majors need a moduleResolution migration — handle deliberately.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
