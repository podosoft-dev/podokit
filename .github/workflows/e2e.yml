name: e2e

# Faithful end-to-end: publish to a local Verdaccio registry, generate an app
# with the real `npx create`, migrate, start it, and run the shipped Playwright
# suite. See docs/testing.md (the "Outer" loop). Runs the full suite nightly and
# on demand; PRs run only the @smoke subset to stay fast.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "templates/**"
      - "packages/**"
      - "scripts/e2e-ci.mjs"
      - "scripts/verdaccio.yaml"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: podokit
          POSTGRES_PASSWORD: podokit
          POSTGRES_DB: podokit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podokit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.1
          cache: npm
      - name: Start MinIO
        run: |
          docker run --detach --name podokit-e2e-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER=podokit \
            --env MINIO_ROOT_PASSWORD=podokitsecret \
            quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for attempt in $(seq 1 30); do
            if docker exec podokit-e2e-minio mc ready local; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs podokit-e2e-minio
              exit 1
            fi
            sleep 1
          done
          docker exec podokit-e2e-minio mc alias set local http://localhost:9000 podokit podokitsecret
          docker exec podokit-e2e-minio mc mb --ignore-existing local/podokit
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run faithful e2e
        run: node scripts/e2e-ci.mjs ${{ github.event_name == 'pull_request' && '--smoke' || '' }}
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: podokit
          POSTGRES_PASSWORD: podokit
          POSTGRES_DB: podokit
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          MAILPIT_URL: http://localhost:8025
          # Backing services for the redis/bullmq/sse/storage/file-upload module
          # specs — their presence flips those tests from self-skip to running.
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_BUCKET: podokit
          S3_ACCESS_KEY_ID: podokit
          S3_SECRET_ACCESS_KEY: podokitsecret
          KEEP: "1" # keep the generated app so the report survives for upload
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            /tmp/podokit-e2e-*/app/tests/playwright-report/
            /tmp/podokit-e2e-*/app/tests/test-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop MinIO
        if: always()
        run: docker rm --force podokit-e2e-minio || true
