name: e2e

# Faithful end-to-end: publish to a local Verdaccio registry, generate an app
# with the real `npx create`, migrate, start it, and run the shipped Playwright
# suite. See docs/testing.md (the "Outer" loop). Runs the full suite nightly and
# on demand. Ready PRs run the risk-based @smoke subset; draft PRs keep only the
# fast CI workflow, and Changesets version PRs stop after package verification.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Verification scope
        required: false
        default: full
        type: choice
        options:
          - full
          - package-smoke
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect e2e-relevant changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq '^(templates/|packages/|scripts/e2e-ci|scripts/verdaccio\.yaml$|\.github/workflows/e2e\.yml$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: changes
    if: >-
      always() &&
      (github.event_name != 'pull_request' ||
        (needs.changes.result == 'success' &&
         needs.changes.outputs.relevant == 'true' &&
         github.event.pull_request.draft == false))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_NPM_CACHE: /home/runner/.cache/podokit-e2e-npm
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: podokit
      POSTGRES_PASSWORD: podokit
      POSTGRES_DB: podokit
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      MAILPIT_URL: http://localhost:8025
      # Backing services for the redis/bullmq/sse/storage/file-upload module
      # specs — their presence flips those tests from self-skip to running.
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: podokit
      S3_ACCESS_KEY_ID: podokit
      S3_SECRET_ACCESS_KEY: podokitsecret
      KEEP: "1" # keep the generated app so the report survives for upload
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: podokit
          POSTGRES_PASSWORD: podokit
          POSTGRES_DB: podokit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podokit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.22.1
          cache: npm
      - name: Start MinIO
        run: |
          docker run --detach --name podokit-e2e-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER=podokit \
            --env MINIO_ROOT_PASSWORD=podokitsecret \
            quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for attempt in $(seq 1 30); do
            if docker exec podokit-e2e-minio mc ready local; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs podokit-e2e-minio
              exit 1
            fi
            sleep 1
          done
          docker exec podokit-e2e-minio mc alias set local http://localhost:9000 podokit podokitsecret
          docker exec podokit-e2e-minio mc mb --ignore-existing local/podokit
      - run: npm ci
      - name: Cache generated app npm downloads
        uses: actions/cache@v6
        with:
          path: ~/.cache/podokit-e2e-npm
          key: e2e-generated-npm-${{ runner.os }}-${{ hashFiles('package-lock.json', 'templates/**/package.json', 'templates/**/module.manifest.json') }}
          restore-keys: |
            e2e-generated-npm-${{ runner.os }}-
      - name: Cache Playwright browsers
        if: >-
          (github.event_name != 'pull_request' || github.head_ref != 'changeset-release/main') &&
          (github.event_name != 'workflow_dispatch' || inputs.mode != 'package-smoke')
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Verify version package installation
        if: >-
          (github.event_name == 'pull_request' && github.head_ref == 'changeset-release/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.mode == 'package-smoke')
        run: node scripts/e2e-ci.mjs --package-smoke
      - name: Run pull request smoke
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: node scripts/e2e-ci.mjs --smoke
      - name: Run full faithful e2e
        if: >-
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_dispatch' || inputs.mode == 'full')
        run: node scripts/e2e-ci.mjs
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            /tmp/podokit-e2e-*/app/tests/playwright-report/
            /tmp/podokit-e2e-*/app/tests/test-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: Stop MinIO
        if: always()
        run: docker rm --force podokit-e2e-minio || true
