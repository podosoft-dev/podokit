name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm test
      # Publish dependencies before their consumers, then standalone packages.
      # Skip a package whose version is already on the registry so re-runs of
      # the same tag are idempotent instead of failing with 403.
      - name: Publish contracts
        run: |
          PKG=@podosoft/podokit-contracts
          VER=$(node -p "require('./packages/contracts/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish auth
        run: |
          PKG=@podosoft/podokit-auth
          VER=$(node -p "require('./packages/podokit-auth/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish template-engine
        run: |
          PKG=@podosoft/podokit-template-engine
          VER=$(node -p "require('./packages/template-engine/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish api-client
        run: |
          PKG=@podosoft/podokit-api-client
          VER=$(node -p "require('./packages/api-client/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish CLI
        run: |
          PKG=@podosoft/podokit
          VER=$(node -p "require('./packages/cli/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish MCP server
        run: |
          PKG=@podosoft/podokit-mcp
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish blog module
        run: |
          PKG=@podosoft/podokit-module-blog
          VER=$(node -p "require('./packages/podokit-module-blog/package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping"
          else
            npm publish -w "$PKG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
