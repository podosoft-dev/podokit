name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm test
      # Publish the engine first (the CLI depends on it), then the CLI.
      - run: npm publish -w @podosoft/podokit-template-engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish -w @podosoft/podokit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
